name: CI

# Fast validation on every code change: runs the test suite only.
# No secrets and no MalwareBazaar API calls — report generation lives in
# malware-intel.yml (schedule / manual dispatch).
on:
  push:
    branches:
      - main
    paths-ignore:
      - "reports/**"
      - "LOG.md"
      - "harness/generated/**"
      - "signals/**"
      - "docs/**"
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -q
